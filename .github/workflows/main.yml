name: Run Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  phpunit:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - laravel: '10.*'
            php: '8.1'
            testbench: '^8.15'
            phpunit: '^10.5'
            dependencies: prefer-lowest
          - laravel: '11.*'
            php: '8.2'
            testbench: '^9.0'
            phpunit: '^11.5'
            dependencies: prefer-stable
          - laravel: '12.*'
            php: '8.2'
            testbench: '^10.0'
            phpunit: '^11.5'
            dependencies: prefer-stable
          - laravel: '13.*'
            php: '8.3'
            testbench: '^11.0'
            phpunit: '^12.5'
            dependencies: prefer-stable
          - laravel: '13.*'
            php: '8.5'
            testbench: '^11.0'
            phpunit: '^12.5'
            dependencies: prefer-stable

    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }} / Testbench ${{ matrix.testbench }} / ${{ matrix.dependencies }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Select matrix dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" --no-update --no-interaction
          composer require --dev "orchestra/testbench:${{ matrix.testbench }}" "phpunit/phpunit:${{ matrix.phpunit }}" --no-update --no-interaction

      - name: Resolve dependencies
        run: |
          # Older supported Laravel releases can have upstream advisories. This
          # flag permits compatibility installation; the current stack is audited below.
          if ! composer update -W --${{ matrix.dependencies }} --prefer-dist --no-interaction --no-progress --no-security-blocking; then
            composer why-not laravel/framework "${{ matrix.laravel }}" || true
            composer why-not orchestra/testbench "${{ matrix.testbench }}" || true
            composer why-not phpunit/phpunit "${{ matrix.phpunit }}" || true
            composer diagnose || true
            exit 1
          fi

      - name: Show installed framework and test versions
        run: |
          php --version
          composer show laravel/framework
          composer show graham-campbell/testbench
          composer show orchestra/testbench
          composer show phpunit/phpunit

      - name: Run PHPUnit
        run: vendor/bin/phpunit

      - name: Check code style
        run: vendor/bin/pint --test

      - name: Audit current dependencies
        if: matrix.laravel == '13.*' && matrix.php == '8.5'
        run: composer audit
